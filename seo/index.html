<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;background:#fff;color:#000;line-height:1.6;padding:2rem}

.header{border-bottom:2px solid #000;padding-bottom:1rem;margin-bottom:2rem}
.header h1{font-size:1.5rem;font-weight:700;margin-bottom:.5rem}
.header p{font-size:.9rem;color:#666}
.section{border:1px solid #000;padding:1.5rem;margin-bottom:1.5rem}
.section-title{font-size:1.2rem;font-weight:700;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid #000}
.tabs{display:flex;border-bottom:1px solid #000;margin-bottom:1rem}
.tab{padding:.75rem 1.5rem;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-weight:500;color:#666}

.rank-section{border:1px solid #000;padding:1rem;margin-top:1rem;background:#f9f9f9}
.rank-title{font-size:.95rem;font-weight:600;margin-bottom:.75rem}

.rank-note{font-size:.75rem;color:#999;margin-top:.25rem}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem}
.summary-card{border:1px solid #000;padding:1rem;text-align:center}
.summary-card.error{border-left:4px solid #e74c3c;background:#fef5f5}

.summary-label{font-size:.85rem;color:#666;margin-bottom:.5rem}

.summary-card.warning .summary-value{color:#f39c12}

.check-section{border:1px solid #000;padding:1.5rem;margin-bottom:1rem}
.check-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid #000}

.check-badge.success{background:#2ecc71;color:#fff}
.check-item{padding:1rem;margin-bottom:.75rem;border:1px solid #ddd;background:#fff}
.check-item.error{border-left:4px solid #e74c3c;background:#fef5f5}
.check-item.warning{border-left:4px solid #f39c12;background:#fef9f3}
.check-item.success{border-left:4px solid #2ecc71;background:#f0fdf4}
.check-item-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem}
.check-item-title{font-weight:600;font-size:.95rem}
.check-status{padding:.2rem .5rem;font-size:.75rem;font-weight:600}
.check-status.error{background:#e74c3c;color:#fff}
.check-status.warning{background:#f39c12;color:#fff}
.check-status.success{background:#2ecc71;color:#fff}
.check-desc{font-size:.85rem;color:#666;margin-bottom:.5rem}
.code-block{background:#f5f5f5;border:1px solid #ddd;padding:.75rem;font-family:monospace;font-size:.75rem;overflow-x:auto;margin:.5rem 0;max-height:200px;overflow-y:auto}
.suggestion{background:#f0fdf4;border-left:2px solid #2ecc71;padding:.75rem;margin-top:.5rem;font-size:.85rem}
.suggestion-title{font-weight:600;margin-bottom:.25rem;color:#2ecc71}
.export-btn{width:100%;margin-top:1.5rem;padding:1rem;background:#000;color:#fff;border:none;font-size:.9rem;font-weight:600;cursor:pointer}

@media (max-width:768px){
.kw-inputs,.summary,.kw-grid,.rank-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>SEO MOLE</h1>
<p>技術的SEO分析 + キーワード最適化診断</p>
</div>
<div class="section">
<div class="tabs">
<button class="tab active" onclick="switchTab('url')">URL入力</button>
<button class="tab" onclick="switchTab('html')">HTML貼り付け</button>
</div>
<div id="urlTab" class="tab-content active">
<div style="margin-bottom:1rem">
<div class="kw-label">ターゲットキーワード（最大3つ）</div>
<div class="kw-inputs">
<input type="text" id="kw1" placeholder="キーワード1"/>
<input type="text" id="kw2" placeholder="キーワード2（任意）"/>
<input type="text" id="kw3" placeholder="キーワード3（任意）"/>
</div>
</div>
<div style="display:flex;gap:.75rem;margin-bottom:.75rem">
<input type="url" id="urlInput" placeholder="https://example.com"/>
<button id="urlBtn">解析開始</button>
</div>
<div class="note">
<strong>注意：</strong>多くのサイトはCORSでブロックされます。取得失敗時はHTML貼り付けモードをご利用ください。キーワードを入力するとページ内最適化レベルを分析します。
</div>
</div>
<div id="htmlTab" class="tab-content">
<div style="margin-bottom:1rem">
<div class="kw-label">ターゲットキーワード（最大3つ）</div>
<div class="kw-inputs">
<input type="text" id="kwh1" placeholder="キーワード1"/>
<input type="text" id="kwh2" placeholder="キーワード2（任意）"/>
<input type="text" id="kwh3" placeholder="キーワード3（任意）"/>
</div>
</div>
<textarea id="htmlInput" placeholder="HTMLソースコードをここに貼り付けてください..."></textarea>
<button id="htmlBtn">チェック開始</button>
<div class="note">
<strong>HTML貼り付け手順：</strong><br>
1. 対象ページを開く → 2. F12キーを押す → 3. Elementsタブで&lt;html&gt;を右クリック → 4. Copy outerHTMLを選択 → 5. ここに貼り付け
</div>
</div>
</div>
<div id="results"></div>
</div>
<script>
function switchTab(tab) {
    const tabs = document.querySelectorAll('.tab');
    const contents = document.querySelectorAll('.tab-content');
    tabs.forEach(t => t.classList.remove('active'));
    contents.forEach(c => c.classList.remove('active'));
    if (tab === 'url') {
        tabs[0].classList.add('active');
        document.getElementById('urlTab').classList.add('active');
    } else {
        tabs[1].classList.add('active');
        document.getElementById('htmlTab').classList.add('active');
    }
}

const urlInput = document.getElementById('urlInput');
const htmlInput = document.getElementById('htmlInput');
const urlBtn = document.getElementById('urlBtn');
const htmlBtn = document.getElementById('htmlBtn');
const results = document.getElementById('results');

urlBtn.addEventListener('click', checkFromUrl);
htmlBtn.addEventListener('click', checkFromHtml);
urlInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') checkFromUrl();
});

async function checkFromUrl() {
    const url = urlInput.value.trim();
    if (!url) {
        alert('URLを入力してください');
        return;
    }
    const keywords = [
        document.getElementById('kw1').value.trim(),
        document.getElementById('kw2').value.trim(),
        document.getElementById('kw3').value.trim()
    ].filter(k => k);
    
    results.innerHTML = '<div class="loading"><div class="spinner"></div><p>分析中...</p></div>';
    urlBtn.disabled = true;
    
    const proxies = [
        `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
        `https://corsproxy.io/?${encodeURIComponent(url)}`,
        `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
        `https://thingproxy.freeboard.io/fetch/${encodeURIComponent(url)}`
    ];
    
    let html = null;
    let lastError = null;
    
    for (const proxyUrl of proxies) {
        try {
            const response = await fetch(proxyUrl);
            if (response.ok) {
                html = await response.text();
                break;
            }
        } catch (error) {
            lastError = error;
            continue;
        }
    }
    
    if (html) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const checkResults = performSEOChecks(doc, url, keywords);
        displayResults(checkResults, keywords, url);
    } else {
        results.innerHTML = `
            <div class="section">
                <div class="section-title">取得失敗</div>
                <p style="margin-bottom:1rem">CORS制限によりURLからの取得に失敗しました。</p>
                <div style="background:#f5f5f5;padding:1rem;border-left:2px solid #000;font-size:.85rem">
                    <strong>解決方法：HTML貼り付けモードを使用</strong><br><br>
                    1. ブラウザで対象ページを開く<br>
                    2. <strong>F12</strong>キーで開発者ツールを開く<br>
                    3. <strong>Elements</strong>（要素）タブを選択<br>
                    4. <strong>&lt;html&gt;</strong>タグを右クリック<br>
                    5. <strong>Copy → Copy outerHTML</strong>を選択<br>
                    6. 上部の「HTML貼り付け」タブに切り替え<br>
                    7. 貼り付けてチェック開始
                </div>
                <div style="margin-top:1rem;font-size:.85rem;color:#666">
                    エラー詳細: ${lastError ? escapeHtml(lastError.message) : 'CORSポリシーによりブロック'}
                </div>
            </div>
        `;
    }
    
    urlBtn.disabled = false;
}

function checkFromHtml() {
    const html = htmlInput.value.trim();
    if (!html) {
        alert('HTMLを貼り付けてください');
        return;
    }
    const keywords = [
        document.getElementById('kwh1').value.trim(),
        document.getElementById('kwh2').value.trim(),
        document.getElementById('kwh3').value.trim()
    ].filter(k => k);
    
    results.innerHTML = '<div class="loading"><div class="spinner"></div><p>分析中...</p></div>';
    htmlBtn.disabled = true;
    
    setTimeout(() => {
        try {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            console.log('HTML解析完了');
            const checkResults = performSEOChecks(doc, '(貼り付けHTML)', keywords);
            console.log('SEOチェック完了', checkResults);
            displayResults(checkResults, keywords, null);
            console.log('結果表示完了');
        } catch (error) {
            console.error('エラー発生:', error);
            results.innerHTML = `<div class="section"><p style="text-align:center;color:var(--e)">エラーが発生しました<br><br>${escapeHtml(error.message)}<br><br>${escapeHtml(error.stack || '')}</p></div>`;
        } finally {
            htmlBtn.disabled = false;
        }
    }, 500);
}

function analyzeKeywords(doc, keywords) {
    if (!keywords || keywords.length === 0) return null;
    const analysis = [];
    for (const keyword of keywords) {
        const lowerKw = keyword.toLowerCase();
        const bodyText = doc.body ? doc.body.textContent.toLowerCase() : '';
        const regex = new RegExp(lowerKw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
        const totalCount = (bodyText.match(regex) || []).length;
        const title = doc.querySelector('title');
        const inTitle = title && title.textContent.toLowerCase().includes(lowerKw);
        const metaDesc = doc.querySelector('meta[name="description"]');
        const inDesc = metaDesc && metaDesc.content.toLowerCase().includes(lowerKw);
        const h1s = doc.querySelectorAll('h1');
        const inH1 = Array.from(h1s).some(h => h.textContent.toLowerCase().includes(lowerKw));
        const h2s = doc.querySelectorAll('h2');
        const inH2 = Array.from(h2s).some(h => h.textContent.toLowerCase().includes(lowerKw));
        const images = doc.querySelectorAll('img[alt]');
        const inAlt = Array.from(images).some(img => img.alt.toLowerCase().includes(lowerKw));
        const wordCount = bodyText.trim().split(/\s+/).length;
        const density = wordCount > 0 ? ((totalCount / wordCount) * 100).toFixed(2) : 0;
        
        // スコア計算の詳細
        const scoreDetails = {
            title: inTitle ? 25 : 0,
            description: inDesc ? 20 : 0,
            h1: inH1 ? 20 : 0,
            h2: inH2 ? 15 : 0,
            imageAlt: inAlt ? 10 : 0,
            frequency: totalCount >= 5 ? 10 : totalCount >= 3 ? 5 : 0
        };
        
        const totalScore = Object.values(scoreDetails).reduce((a, b) => a + b, 0);
        
        analysis.push({
            keyword: keyword,
            score: Math.min(100, totalScore),
            scoreDetails: scoreDetails,
            totalCount: totalCount,
            density: density,
            inTitle: inTitle,
            inDesc: inDesc,
            inH1: inH1,
            inH2: inH2,
            inAlt: inAlt
        });
    }
    return analysis;
}

function performSEOChecks(doc, url, keywords) {
    console.log('SEO分析開始:', url);
    const checks = [];
    let score = 100;
    let errorCount = 0;
    let warningCount = 0;
    let successCount = 0;
    const keywordAnalysis = analyzeKeywords(doc, keywords);
    console.log('キーワード分析完了:', keywordAnalysis);
    
    const title = doc.querySelector('title');
    if (!title || !title.textContent.trim()) {
        checks.push({cat:'メタ情報',tit:'タイトルタグなし',st:'e',des:'titleタグは必須です',sug:'50-60文字程度のタイトルを設定してください'});
        errorCount++;score -= 10;
    } else {
        const titleLen = title.textContent.length;
        if (titleLen < 30) {
            checks.push({cat:'メタ情報',tit:'タイトルが短い',st:'w',des:`現在: ${titleLen}文字（推奨: 30-60文字）`,sug:'より詳細な30文字以上のタイトルを推奨します'});
            warningCount++;score -= 3;
        } else if (titleLen > 60) {
            checks.push({cat:'メタ情報',tit:'タイトルが長い',st:'w',des:`現在: ${titleLen}文字（推奨: 30-60文字）`,sug:'検索結果で切り詰められる可能性があります',code:escapeHtml(title.outerHTML)});
            warningCount++;score -= 2;
        } else {
            checks.push({cat:'メタ情報',tit:'タイトルタグ',st:'s',des:`${titleLen}文字 - 適切な長さです`,code:escapeHtml(title.outerHTML)});
            successCount++;
        }
    }
    
    const metaDesc = doc.querySelector('meta[name="description"]');
    if (!metaDesc || !metaDesc.content.trim()) {
        checks.push({cat:'メタ情報',tit:'メタディスクリプションなし',st:'e',des:'検索結果の説明文が未設定です',sug:'120-160文字でページ内容を要約してください'});
        errorCount++;score -= 8;
    } else {
        const descLen = metaDesc.content.length;
        if (descLen < 120) {
            checks.push({cat:'メタ情報',tit:'ディスクリプションが短い',st:'w',des:`現在: ${descLen}文字（推奨: 120-160文字）`,sug:'より詳細な説明を追加してください'});
            warningCount++;score -= 3;
        } else if (descLen > 160) {
            checks.push({cat:'メタ情報',tit:'ディスクリプションが長い',st:'w',des:`現在: ${descLen}文字（推奨: 120-160文字）`,sug:'160文字以内に収めることを推奨します'});
            warningCount++;score -= 2;
        } else {
            checks.push({cat:'メタ情報',tit:'メタディスクリプション',st:'s',des:`${descLen}文字 - 適切な長さです`});
            successCount++;
        }
    }
    
    const h1 = doc.querySelectorAll('h1');
    
    // bodyTextとwordCountを先に定義（後のチェックで使用）
    const bodyText = doc.body ? doc.body.textContent : '';
    const wordCount = bodyText.trim().split(/\s+/).length;
    
    if (h1.length === 0) {
        checks.push({cat:'見出し構造',tit:'H1タグなし',st:'e',des:'ページの主題を示すH1タグがありません',sug:'ページに1つのH1タグを配置してください'});
        errorCount++;score -= 8;
    } else if (h1.length > 1) {
        checks.push({cat:'見出し構造',tit:'H1タグが複数',st:'w',des:`${h1.length}個のH1タグが検出されました`,sug:'H1タグは1ページに1つが推奨されます'});
        warningCount++;score -= 3;
    } else {
        checks.push({cat:'見出し構造',tit:'H1タグ',st:'s',des:'適切に配置されています',code:escapeHtml(h1[0].outerHTML)});
        successCount++;
    }
    
    const h2 = doc.querySelectorAll('h2');
    const h3 = doc.querySelectorAll('h3');
    const h4 = doc.querySelectorAll('h4');
    const h5 = doc.querySelectorAll('h5');
    const h6 = doc.querySelectorAll('h6');
    
    // 見出しの総数チェック
    checks.push({cat:'見出し構造',tit:'見出し統計',st:'s',des:`H1:${h1.length} H2:${h2.length} H3:${h3.length} H4:${h4.length} H5:${h5.length} H6:${h6.length}`});
    successCount++;
    
    // 見出し階層の適切性チェック
    if (h1.length > 0 && h2.length === 0 && (h3.length > 0 || h4.length > 0)) {
        checks.push({cat:'見出し構造',tit:'見出し階層が不適切',st:'w',des:'H1の次にH3やH4が使われています（H2が不足）',sug:'見出しは順序通り（H1→H2→H3...）に使用してください'});
        warningCount++;score -= 2;
    } else if (h2.length > 0 && h3.length === 0 && (h4.length > 0 || h5.length > 0)) {
        checks.push({cat:'見出し構造',tit:'見出し階層が不適切',st:'w',des:'H2の次にH4やH5が使われています（H3が不足）',sug:'見出しは順序通りに使用してください'});
        warningCount++;score -= 2;
    } else if (h1.length > 0 && h2.length > 0) {
        checks.push({cat:'見出し構造',tit:'見出し階層',st:'s',des:'適切な階層構造です'});
        successCount++;
    }
    
    // H2の数チェック
    if (h2.length === 0 && wordCount > 500) {
        checks.push({cat:'見出し構造',tit:'H2タグなし',st:'w',des:'コンテンツ量に対してH2が不足しています',sug:'内容をH2で適切にセクション分けしてください'});
        warningCount++;score -= 2;
    } else if (h2.length > 0 && h2.length < 3 && wordCount > 1000) {
        checks.push({cat:'見出し構造',tit:'H2タグが少ない',st:'w',des:`H2が${h2.length}個のみ（${wordCount}単語のコンテンツ）`,sug:'長文は複数のH2でセクション分けすることを推奨します'});
        warningCount++;score -= 1;
    } else if (h2.length >= 3) {
        checks.push({cat:'見出し構造',tit:'H2タグ',st:'s',des:`${h2.length}個 - 適切にセクション分けされています`});
        successCount++;
    }
    
    // 見出しテキストの長さチェック
    const allHeadings = doc.querySelectorAll('h1, h2, h3, h4, h5, h6');
    const longHeadings = Array.from(allHeadings).filter(h => h.textContent.length > 60);
    const shortHeadings = Array.from(allHeadings).filter(h => h.textContent.trim().length < 5);
    if (longHeadings.length > 0) {
        checks.push({cat:'見出し構造',tit:'見出しが長すぎる',st:'w',des:`${longHeadings.length}個の見出しが60文字を超えています`,sug:'見出しは簡潔に（60文字以内推奨）'});
        warningCount++;score -= 1;
    }
    if (shortHeadings.length > 0) {

            const name = input.name ? `name="${input.name}"` : '';
            const id = input.id ? `id="${input.id}"` : '(id未設定)';
            const placeholder = input.placeholder ? `placeholder="${input.placeholder}"` : '';
            const identifiers = [name, placeholder].filter(x => x).join(' ');
            
            return `${index + 1}. <${type}> ${id} ${identifiers}`;
        }).join('\n');
        
        const sampleCode = inputsWithoutLabel.slice(0, 3).map(input => escapeHtml(input.outerHTML)).join('\n\n');
        
        checks.push({
            cat:'アクセシビリティ',
            tit:'フォームのlabelなし',
            st:'e',
            des:`${inputsWithoutLabel.length}個のフォーム要素にラベルがありません\n\n【問題のある要素:】\n${inputDetails}${inputsWithoutLabel.length > 5 ? '\n\n...他 ' + (inputsWithoutLabel.length - 5) + '個' : ''}`,
            sug:'すべてのinput要素にlabel要素を関連付けてください',
            code:sampleCode
        });
        errorCount++;score -= 3;
    } else if (inputs.length > 0) {
        checks.push({cat:'アクセシビリティ',tit:'フォームのlabel',st:'s',des:'すべてのフォーム要素にラベルがあります'});
        successCount++;
    }
    
    const buttons = doc.querySelectorAll('button, input[type="button"], input[type="submit"]');
    const buttonsWithoutText = Array.from(buttons).filter(btn => !btn.textContent.trim() && !btn.value && !btn.hasAttribute('aria-label'));
    if (buttonsWithoutText.length > 0) {
        // テキストのないボタンを具体的に特定
        const buttonDetails = buttonsWithoutText.slice(0, 5).map((btn, index) => {
            const type = btn.type || 'button';
            const id = btn.id ? `id="${btn.id}"` : '';
            const className = btn.className ? `class="${btn.className}"` : '';
            const identifiers = [id, className].filter(x => x).join(' ');
            
            return `${index + 1}. <${btn.tagName.toLowerCase()} type="${type}"> ${identifiers || '(識別子なし)'}`;
        }).join('\n');
        
        const sampleCode = buttonsWithoutText.slice(0, 3).map(btn => escapeHtml(btn.outerHTML)).join('\n\n');
        
        checks.push({
            cat:'アクセシビリティ',
            tit:'テキストのないボタン',
            st:'w',
            des:`${buttonsWithoutText.length}個のボタンにテキストがありません\n\n【問題のあるボタン:】\n${buttonDetails}${buttonsWithoutText.length > 5 ? '\n\n...他 ' + (buttonsWithoutText.length - 5) + '個' : ''}`,
            sug:'ボタンには適切なテキストかaria-labelを設定してください',
            code:sampleCode
        });
        warningCount++;score -= 2;
    } else if (buttons.length > 0) {
        checks.push({cat:'アクセシビリティ',tit:'ボタンのテキスト',st:'s',des:'すべてのボタンに適切なテキストがあります'});
        successCount++;
    }
    
    // === リンク構造の詳細 ===
    const allLinks = doc.querySelectorAll('a[href]');
    const emptyLinks = Array.from(allLinks).filter(link => !link.textContent.trim() && !link.querySelector('img[alt]') && !link.hasAttribute('aria-label'));
    if (emptyLinks.length > 0) {
        // 空のリンクを具体的に特定
        const linkDetails = emptyLinks.slice(0, 5).map((link, index) => {
            const href = link.href || link.getAttribute('href') || '';
            const id = link.id ? `id="${link.id}"` : '';
            const className = link.className ? `class="${link.className}"` : '';
            const identifiers = [id, className].filter(x => x).join(' ');
            
            return `${index + 1}. ${href}\n   ${identifiers || '(識別子なし)'}`;
        }).join('\n\n');
        
        const sampleCode = emptyLinks.slice(0, 3).map(link => escapeHtml(link.outerHTML)).join('\n\n');
        
        checks.push({
            cat:'リンク構造',
            tit:'空のリンクテキスト',
            st:'w',
            des:`${emptyLinks.length}個のリンクにテキストがありません\n\n【問題のあるリンク:】\n${linkDetails}${emptyLinks.length > 5 ? '\n\n...他 ' + (emptyLinks.length - 5) + '個' : ''}`,
            sug:'すべてのリンクに適切なテキストを設定してください',
            code:sampleCode
        });
        warningCount++;score -= 2;
    } else if (allLinks.length > 0) {
        checks.push({cat:'リンク構造',tit:'リンクテキスト',st:'s',des:'すべてのリンクに適切なテキストがあります'});
        successCount++;
    }
    
    const externalLinksNoRel = Array.from(externalLinks).filter(link => {
        const rel = link.getAttribute('rel') || '';
        return link.target === '_blank' && !rel.includes('noopener');
    });
    if (externalLinksNoRel.length > 0) {
        checks.push({cat:'リンク構造',tit:'外部リンクのrel属性不足',st:'w',des:`${externalLinksNoRel.length}個のtarget="_blank"リンクにrel="noopener"がありません`,sug:'セキュリティのためrel="noopener noreferrer"を追加してください'});
        warningCount++;score -= 2;
    } else if (externalLinks.length > 0) {
        checks.push({cat:'リンク構造',tit:'外部リンクのrel属性',st:'s',des:'適切に設定されています'});
        successCount++;
    }
    
    const targetBlankLinks = doc.querySelectorAll('a[target="_blank"]');
    if (targetBlankLinks.length > 0) {
        checks.push({cat:'リンク構造',tit:'target="_blank"使用',st:'s',des:`${targetBlankLinks.length}個のリンクで使用（rel属性を確認してください）`});
        successCount++;
    }
    
    // === メタ情報の拡充 ===
    const author = doc.querySelector('meta[name="author"]');
    if (!author) {
        checks.push({cat:'メタ情報',tit:'author未設定',st:'w',des:'著者情報が未設定です',sug:'コンテンツの信頼性向上のため設定を推奨します'});
        warningCount++;score -= 1;
    } else {
        checks.push({cat:'メタ情報',tit:'author',st:'s',des:'設定済み',code:escapeHtml(author.outerHTML)});
        successCount++;
    }
    
    const themeColor = doc.querySelector('meta[name="theme-color"]');
    if (!themeColor) {
        checks.push({cat:'メタ情報',tit:'theme-color未設定',st:'w',des:'モバイルブラウザのテーマカラー未設定',sug:'ブランドカラーを設定してください'});
        warningCount++;score -= 1;
    } else {
        checks.push({cat:'メタ情報',tit:'theme-color',st:'s',des:'設定済み',code:escapeHtml(themeColor.outerHTML)});
        successCount++;
    }
    
    const appleTouchIcon = doc.querySelector('link[rel="apple-touch-icon"]');
    if (!appleTouchIcon) {
        checks.push({cat:'メタ情報',tit:'apple-touch-icon未設定',st:'w',des:'iOSホーム画面アイコン未設定',sug:'180x180pxのアイコンを設定してください'});
        warningCount++;score -= 1;
    } else {
        checks.push({cat:'メタ情報',tit:'apple-touch-icon',st:'s',des:'設定済み',code:escapeHtml(appleTouchIcon.outerHTML)});
        successCount++;
    }
    
    // === コンテンツ品質 ===
    const paragraphs = doc.querySelectorAll('p');
    let totalSentences = 0;
    let totalKanji = 0;
    let totalChars = 0;
    paragraphs.forEach(p => {
        const text = p.textContent;
        totalSentences += (text.match(/[。！？]/g) || []).length;
        totalKanji += (text.match(/[\u4e00-\u9faf]/g) || []).length;
        totalChars += text.length;
    });
    const avgSentenceLength = totalSentences > 0 ? Math.round(totalChars / totalSentences) : 0;
    const kanjiRatio = totalChars > 0 ? Math.round((totalKanji / totalChars) * 100) : 0;
    
    if (avgSentenceLength > 100) {
        checks.push({cat:'コンテンツ品質',tit:'文が長すぎる',st:'w',des:`平均文長: ${avgSentenceLength}文字（推奨: 60-80文字）`,sug:'文を短く分割して読みやすくしてください'});
        warningCount++;score -= 2;
    } else if (avgSentenceLength > 0) {
        checks.push({cat:'コンテンツ品質',tit:'文の長さ',st:'s',des:`平均文長: ${avgSentenceLength}文字 - 読みやすい長さです`});
        successCount++;
    }
    
    if (kanjiRatio > 40) {
        checks.push({cat:'コンテンツ品質',tit:'漢字が多い',st:'w',des:`漢字率: ${kanjiRatio}%（推奨: 20-30%）`,sug:'ひらがなを適度に使用して読みやすくしてください'});
        warningCount++;score -= 1;
    } else if (totalChars > 0) {
        checks.push({cat:'コンテンツ品質',tit:'漢字率',st:'s',des:`${kanjiRatio}% - 適切なバランスです`});
        successCount++;
    }
    
    const longParagraphs = Array.from(paragraphs).filter(p => p.textContent.length > 300);
    if (longParagraphs.length > 0) {
        checks.push({cat:'コンテンツ品質',tit:'長い段落',st:'w',des:`${longParagraphs.length}個の段落が300文字以上です`,sug:'段落を適切な長さに分割してください'});
        warningCount++;score -= 1;
    } else if (paragraphs.length > 0) {
        checks.push({cat:'コンテンツ品質',tit:'段落の長さ',st:'s',des:'適切な長さです'});
        successCount++;
    }
    
    const lists = doc.querySelectorAll('ul, ol');
    if (lists.length > 0) {
        checks.push({cat:'コンテンツ品質',tit:'リスト要素',st:'s',des:`${lists.length}個のリストで情報を構造化しています`});
        successCount++;
    } else {
        checks.push({cat:'コンテンツ品質',tit:'リスト未使用',st:'w',des:'リスト要素で情報を構造化することを推奨します'});
        warningCount++;score -= 1;
    }
    
    const tables = doc.querySelectorAll('table');
    const tablesWithoutCaption = Array.from(tables).filter(table => !table.querySelector('caption'));
    if (tablesWithoutCaption.length > 0) {
        checks.push({cat:'コンテンツ品質',tit:'テーブルのcaptionなし',st:'w',des:`${tablesWithoutCaption.length}個のテーブルにcaptionがありません`,sug:'テーブルには説明的なcaptionを追加してください'});
        warningCount++;score -= 1;
    } else if (tables.length > 0) {
        checks.push({cat:'コンテンツ品質',tit:'テーブルのcaption',st:'s',des:'すべてのテーブルにcaptionがあります'});
        successCount++;
    }
    
    // === ソーシャルメディア拡張 ===
    const fbAppId = doc.querySelector('meta[property="fb:app_id"]');
    if (!fbAppId) {
        checks.push({cat:'SNS対応',tit:'Facebook App ID未設定',st:'w',des:'Facebook Insightsが利用できません',sug:'fb:app_idを設定してください'});
        warningCount++;score -= 1;
    } else {
        checks.push({cat:'SNS対応',tit:'Facebook App ID',st:'s',des:'設定済み'});
        successCount++;
    }
    
    const twitterSite = doc.querySelector('meta[name="twitter:site"]');
    if (!twitterSite) {
        checks.push({cat:'SNS対応',tit:'Twitter サイトアカウント未設定',st:'w',des:'Twitter Cardに運営者情報が表示されません',sug:'twitter:siteを設定してください'});
        warningCount++;score -= 1;
    } else {
        checks.push({cat:'SNS対応',tit:'Twitter サイトアカウント',st:'s',des:'設定済み',code:escapeHtml(twitterSite.outerHTML)});
        successCount++;
    }
    
    // === 技術的SEO ===
    // 推定読み込み時間（リソース数から）
    const totalResources = externalCSS.length + externalJS.length + images.length;
    const estimatedLoadTime = totalResources * 0.1; // 簡易推定
    if (estimatedLoadTime > 5) {
        checks.push({cat:'技術的SEO',tit:'読み込み時間推定',st:'w',des:`推定: ${estimatedLoadTime.toFixed(1)}秒（リソース${totalResources}個）`,sug:'リソースを最適化してください'});
        warningCount++;score -= 2;
    } else {
        checks.push({cat:'技術的SEO',tit:'読み込み時間推定',st:'s',des:`推定: ${estimatedLoadTime.toFixed(1)}秒 - 良好です`});
        successCount++;
    }
    
    score = Math.max(0, Math.min(100, score));
    console.log('SEOチェック完了 - スコア:', score, 'チェック数:', checks.length);
    return {url:url,time:new Date().toLocaleString('ja-JP'),score:Math.round(score),sum:{tot:checks.length,e:errorCount,w:warningCount,s:successCount},checks:checks,keywordAnalysis:keywordAnalysis};
}

function displayResults(res, keywords, url) {
    console.log('結果表示開始:', res);
    const gc = res.checks.reduce((a,c)=>{if(!a[c.cat])a[c.cat]=[];a[c.cat].push(c);return a},{});
    console.log('カテゴリ別グループ化完了:', Object.keys(gc));
    results.innerHTML = '';
    
    if (res.keywordAnalysis && res.keywordAnalysis.length > 0) {
        const kwSection = document.createElement('div');
        kwSection.className = 'kw-section';
        let kwHtml = '<div class="section-title">キーワード分析</div><div class="kw-grid">';
        for (const kw of res.keywordAnalysis) {
            kwHtml += `
                <div class="kw-card">
                    <div class="kw-name">${escapeHtml(kw.keyword)}</div>
                    <div class="kw-metric"><span class="label">総合スコア</span><span class="value" style="font-size:1.2rem;color:#000">${kw.score}/100点</span></div>
                    <div style="margin:.75rem 0;padding:.75rem;background:#f9f9f9;border:1px solid #e0e0e0;border-radius:4px">
                        <div style="font-size:.8rem;font-weight:600;margin-bottom:.5rem;color:#666">スコア内訳:</div>
                        <div class="kw-metric" style="border:none;padding:.25rem 0"><span class="label">タイトル内</span><span class="value ${kw.scoreDetails.title > 0 ? 'yes' : 'no'}">${kw.inTitle ? '○' : '×'} ${kw.scoreDetails.title}点</span></div>
                        <div class="kw-metric" style="border:none;padding:.25rem 0"><span class="label">ディスクリプション内</span><span class="value ${kw.scoreDetails.description > 0 ? 'yes' : 'no'}">${kw.inDesc ? '○' : '×'} ${kw.scoreDetails.description}点</span></div>
                        <div class="kw-metric" style="border:none;padding:.25rem 0"><span class="label">H1内</span><span class="value ${kw.scoreDetails.h1 > 0 ? 'yes' : 'no'}">${kw.inH1 ? '○' : '×'} ${kw.scoreDetails.h1}点</span></div>
                        <div class="kw-metric" style="border:none;padding:.25rem 0"><span class="label">H2内</span><span class="value ${kw.scoreDetails.h2 > 0 ? 'yes' : 'no'}">${kw.inH2 ? '○' : '×'} ${kw.scoreDetails.h2}点</span></div>
                        <div class="kw-metric" style="border:none;padding:.25rem 0"><span class="label">画像alt内</span><span class="value ${kw.scoreDetails.imageAlt > 0 ? 'yes' : 'no'}">${kw.inAlt ? '○' : '×'} ${kw.scoreDetails.imageAlt}点</span></div>
                        <div class="kw-metric" style="border:none;padding:.25rem 0"><span class="label">出現回数 (${kw.totalCount}回)</span><span class="value ${kw.scoreDetails.frequency > 0 ? 'yes' : 'no'}">${kw.scoreDetails.frequency}点</span></div>
                    </div>
                    <div class="kw-metric"><span class="label">キーワード密度</span><span class="value">${kw.density}%</span></div>
                    <div style="font-size:.75rem;color:#999;margin-top:.5rem;line-height:1.5">
                        最適な密度: 1-3%<br>
                        推奨出現回数: 5回以上
                    </div>
                </div>
            `;
        }
        kwHtml += '</div>';
        if (url && url !== '(貼り付けHTML)') {
            kwHtml += '<div class="rank-section">';
            kwHtml += '<div class="rank-title">キーワード最適化レベル</div>';
            kwHtml += '<div style="font-size:.75rem;color:#999;margin-bottom:.75rem">※実際の検索順位はGoogle Search Consoleで確認してください</div>';
            kwHtml += '<div class="rank-grid">';
            for (const kw of res.keywordAnalysis) {
                let level = '';
                let levelColor = '';
                if (kw.score >= 80) {
                    level = '優秀';
                    levelColor = '#2ecc71';
                } else if (kw.score >= 60) {
                    level = '良好';
                    levelColor = '#3498db';
                } else if (kw.score >= 40) {
                    level = '要改善';
                    levelColor = '#f39c12';
                } else {
                    level = '大幅改善必要';
                    levelColor = '#e74c3c';
                }
                kwHtml += `
                    <div class="rank-item">
                        <div class="rank-kw">${escapeHtml(kw.keyword)}</div>
                        <div class="rank-value" style="color:${levelColor}">${level}</div>
                        <div class="rank-note">${kw.score}点</div>
                    </div>
                `;
            }
            kwHtml += '</div>';
            kwHtml += '<div style="font-size:.75rem;color:#666;margin-top:1rem;padding:.75rem;background:#f9f9f9;border:1px solid #e0e0e0">';
            kwHtml += '<strong>最適化レベルの目安:</strong><br>';
            kwHtml += '80点以上: 上位表示の可能性が高い<br>';
            kwHtml += '60-79点: 中程度の最適化<br>';
            kwHtml += '40-59点: 改善の余地あり<br>';
            kwHtml += '39点以下: 大幅な改善が必要';
            kwHtml += '</div></div>';
        }
        kwSection.innerHTML = kwHtml;
        results.appendChild(kwSection);
    }
    
    const scoreSection = document.createElement('div');
    scoreSection.className = 'score-section';
    scoreSection.innerHTML = `<div class="score-value">${res.score}</div><div class="score-label">SEOスコア / 100点</div>`;
    results.appendChild(scoreSection);
    
    const summary = document.createElement('div');
    summary.className = 'summary';
    summary.appendChild(createSummaryCard('error','エラー',res.sum.e));
    summary.appendChild(createSummaryCard('warning','警告',res.sum.w));
    summary.appendChild(createSummaryCard('success','成功',res.sum.s));
    results.appendChild(summary);
    
    for(const[cat,its]of Object.entries(gc)){
        results.appendChild(createSection(cat,its));
    }
    
    const exportBtn = document.createElement('button');
    exportBtn.className = 'export-btn';
    exportBtn.textContent = 'HTMLレポートをダウンロード';
    exportBtn.onclick = exportHTML;
    results.appendChild(exportBtn);
    
    window.currentResults = res;
}

function createSummaryCard(type,label,value){
    const card = document.createElement('div');
    card.className = `summary-card ${type}`;
    card.innerHTML = `<div class="summary-label">${label}</div><div class="summary-value">${value}</div>`;
    return card;
}

function createSection(category,items){
    const section = document.createElement('div');
    section.className = 'check-section';
    const errorItems = items.filter(i=>i.st==='e').length;
    const warningItems = items.filter(i=>i.st==='w').length;
    const badgeClass = errorItems>0?'error':warningItems>0?'warning':'success';
    const badgeText = errorItems>0?`${errorItems}件のエラー`:warningItems>0?`${warningItems}件の警告`:'OK';
    section.innerHTML = `
        <div class="check-header">
            <div class="check-title">${category}</div>
            <div class="check-badge ${badgeClass}">${badgeText}</div>
        </div>
    `;
    items.forEach(item=>{
        const checkItem = createCheckItem(item);
        section.appendChild(checkItem);
    });
    return section;
}

function createCheckItem(item){
    const div = document.createElement('div');
    div.className = `check-item ${item.st==='e'?'error':item.st==='w'?'warning':'success'}`;
    const statusText = item.st==='e'?'エラー':item.st==='w'?'警告':'OK';
    let html = `
        <div class="check-item-header">
            <div class="check-item-title">${item.tit}</div>
            <div class="check-status ${item.st==='e'?'error':item.st==='w'?'warning':'success'}">${statusText}</div>
        </div>
        <div class="check-desc">${item.des}</div>
    `;
    if(item.code){
        html += `<div class="code-block">${item.code}</div>`;
    }
    if(item.sug){
        html += `<div class="suggestion"><div class="suggestion-title">改善提案</div>${item.sug}</div>`;
    }
    div.innerHTML = html;
    return div;
}

function escapeHtml(t){
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
}

function exportHTML(){
    const res = window.currentResults;
    if(!res)return;
    const clone = document.cloneNode(true);
    const cloneResults = clone.getElementById('results');
    const exportBtn = cloneResults.querySelector('.export-btn');
    if(exportBtn)exportBtn.remove();
    const blob = new Blob([clone.documentElement.outerHTML],{type:'text/html;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `seo-report-${new Date().getTime()}.html`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
</script>
