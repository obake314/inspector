name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /var/www/inspector
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            # LAST UPDATE タイムスタンプを日本時間で置換
            BUILD_TIME=$(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M')
            sed -i "s/__BUILD_TIME__/${BUILD_TIME}/g" axe/public/index.html

            cd /var/www/inspector/axe
            npm ci --omit=dev
            pm2 restart inspector-axe --update-env
            pm2 save
